<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f3f4f6; display:flex; align-items:center; justify-content:center; height:100vh }
    .card { background:white; padding:24px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08); width:320px }
    label{display:block;margin-bottom:6px;font-size:13px}
    input{width:100%;padding:8px 10px;margin-bottom:12px;border:1px solid #e5e7eb;border-radius:6px}
    button{width:100%;padding:10px;border-radius:6px;border:none;background:#10b981;color:white;font-weight:600;cursor:pointer}
    .muted{font-size:13px;color:#6b7280;margin-top:12px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h3>Sign in</h3>
    <div>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="password">
    </div>
    <div>
      <button id="loginBtn" type="button">Sign in</button>
    </div>
    <div class="muted">No account? <a href="signup.html">Create one</a></div>
  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { alert('Email and password required'); return; }

      try {
        const res = await fetch('http://localhost:4000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { alert(data.message || 'Login failed'); return; }

        // store token
        if (data.token) localStorage.setItem('authToken', data.token);
        alert('Login successful');
        // redirect or load app
      } catch (err) {
        console.error(err);
        alert('Network error');
      }
    });
  </script>
</body>
</html>
